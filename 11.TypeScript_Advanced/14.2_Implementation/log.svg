<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="bgGrad" cx="40%" cy="35%" r="70%">
      <stop offset="0%" style="stop-color:#111111"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="tipglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#bgGrad)"/>
  <rect width="100" height="100" rx="22" fill="none" stroke="white" stroke-width="0.4" opacity="0.12"/>

  <!-- Track rings -->
  <circle cx="50" cy="50" r="34" fill="none" stroke="white" stroke-width="0.5" opacity="0.1"/>
  <circle cx="50" cy="50" r="26" fill="none" stroke="white" stroke-width="0.4" opacity="0.07"/>

  <!-- Tick marks -->
  <line x1="50" y1="13" x2="50" y2="17" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="84" y1="26" x2="81.4" y2="28.5" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="87" y1="50" x2="83" y2="50" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="84" y1="74" x2="81.4" y2="71.5" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="50" y1="87" x2="50" y2="83" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="16" y1="74" x2="18.6" y2="71.5" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="13" y1="50" x2="17" y2="50" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="16" y1="26" x2="18.6" y2="28.5" stroke="white" stroke-width="1" opacity="0.3"/>

  <!-- Main arc -->
  <path d="M 50 16 A 34 34 0 1 1 16.5 48" fill="none" stroke="white" stroke-width="6" stroke-linecap="round" filter="url(#glow)" opacity="0.95"/>

  <!-- Fade tail -->
  <path d="M 16.5 48 A 34 34 0 0 1 22 27" fill="none" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.12"/>

  <!-- Core -->
  <circle cx="50" cy="50" r="18" fill="url(#coreGlow)"/>
  <circle cx="50" cy="50" r="8" fill="none" stroke="white" stroke-width="0.8" opacity="0.2" stroke-dasharray="2,3"/>
  <circle cx="50" cy="50" r="3" fill="white" opacity="0.95" filter="url(#glow)"/>
  <circle cx="50" cy="50" r="1.2" fill="black"/>

  <!-- Tip -->
  <circle cx="50" cy="16" r="5.5" fill="white" filter="url(#tipglow)" opacity="0.9"/>
  <circle cx="50" cy="16" r="2.5" fill="white"/>

  <!-- Data dots -->
  <circle cx="84" cy="50" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="73.5" cy="75.9" r="1.5" fill="white" opacity="0.3"/>
</svg>